name: Tailwind Check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Tailwind check
        run: npm run check

      - name: Upload Tailwind log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tailwind-check-log
          path: logs/tailwind-check.log
          if-no-files-found: warn
